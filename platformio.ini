[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ===== ESP32-S3-N16R8 Configuration =====
; 16MB Flash + 8MB PSRAM (Octal)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; ===== Build Flags =====
build_flags =
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM

; ===== Pin Assignments (reference) =====
; LED_PIN     = 48  (WS2812 RGB)
; CSN_PIN     = 32  (NRF24L01 CSN)
; CE_PIN      = 38  (NRF24L01 CE)
; SCK_PIN     = 40  (SPI CLK)
; MOSI_PIN    = 41  (SPI MOSI)
; MISO_PIN    = 42  (SPI MISO)
; JAM_BUTTON  = 0   (BOOT button)

build_src_filter =
    +<*>

lib_deps = 
    ; No external libraries needed

monitor_speed = 115200
