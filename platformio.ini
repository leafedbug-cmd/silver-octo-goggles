[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; ===== ESP32-S3-N16R8 Configuration =====
; 16MB Flash + 8MB PSRAM (Octal)
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB

; ===== Build Flags =====
build_flags =
    -DARDUINO_ARCH_ESP32
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ===== Pin Assignments (reference) =====
; LED_PIN     = 48  (WS2812 RGB)
; CSN_PIN     = 10  (NRF24L01 CSN)
; CE_PIN      = 9   (NRF24L01 CE)
; SCK_PIN     = 12  (SPI CLK)
; MOSI_PIN    = 11  (SPI MOSI)
; MISO_PIN    = 13  (SPI MISO)
; JAM_SWITCH  = 21  (External 3-pin switch)

build_src_filter =
    +<*>

lib_deps = 
    ; No external libraries needed

; ===== Serial Monitor =====
monitor_speed = 115200
monitor_port = COM9
monitor_rts = 0
monitor_dtr = 0
